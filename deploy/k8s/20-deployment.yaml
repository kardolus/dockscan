# dockscan — continuously ingests curated Brooklyn Citi Bike dock status into Postgres.
# Tracks the curated multi-neighborhood set (Red Hook + Brooklyn neighbors); see
# client/neighborhoods.json. Each row is tagged with its neighborhood.
#
# Prereqs:
#   kubectl -n citibike create secret generic citibike-db \
#       --from-literal=DATABASE_URL='postgres://citibike:<pw>@citibike-postgres.citibike.svc.cluster.local:5432/citibike?sslmode=disable'
#   # build + push to GHCR (forge has no passwordless sudo for ctr-import; the cluster
#   # pulls via the ghcr-pull imagePullSecret, same as citibike-web):
#   docker build -t ghcr.io/kardolus/citi-bike-dock-tracker:vN . && docker push ghcr.io/kardolus/citi-bike-dock-tracker:vN
#   kubectl -n citibike set image deploy/dockscan dockscan=ghcr.io/kardolus/citi-bike-dock-tracker:vN
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: citibike-dockscan
  namespace: bikeshare
  labels: {app: citibike-dockscan, role: dockscan, city: citibike}
spec:
  replicas: 1
  selector:
    matchLabels: {app: citibike-dockscan}
  template:
    metadata:
      labels: {app: citibike-dockscan, role: dockscan, city: citibike}
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: dockscan
          image: ghcr.io/kardolus/citi-bike-dock-tracker:v7
          imagePullPolicy: IfNotPresent
          args: ["ts", "--area", "bk-curated", "--interval", "180", "--postgres", "--metrics-addr", ":2112"]
          ports:
            - {containerPort: 2112, name: metrics}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: {name: citibike-db, key: DATABASE_URL}
          readinessProbe:
            httpGet: {path: /ready, port: 2112}
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet: {path: /healthz, port: 2112}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: {cpu: 25m, memory: 32Mi}
            limits: {memory: 128Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: citibike-dockscan
  namespace: bikeshare
  labels: {app: citibike-dockscan, role: dockscan, city: citibike}
spec:
  selector: {app: citibike-dockscan}
  ports:
    - {name: metrics, port: 2112, targetPort: 2112}
