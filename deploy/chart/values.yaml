# Defaults for one bikeshare-city stack. Override per city via values/<city>.yaml.
# Resource names derive from `name` (e.g. cabi → cabi-postgres, cabi-web, cabi-neighborhoods,
# cabi-db, cabi-web-db). The neighborhoods/meta/og ConfigMaps + db Secrets + ghcr-pull are
# created out-of-band (see deploy/chart/README), exactly as for the hand-written manifests.

name: ""                 # resource prefix (e.g. cabi / velib / ecobici) — unique within the shared ns
namespace: bikeshare     # all cities share ONE namespace; created out-of-band, not owned by a release
hostIP: 10.0.0.120       # forge host running the per-city docker TimescaleDB
pgPort: 0                # that DB's host port (e.g. 5439)

ingress:
  enabled: true          # set false to install without the Ingress (cutover: verify internally, then flip on)

gbfs:
  informationUrl: ""
  statusUrl: ""
feedFormat: gbfs          # "gbfs" (default) or "tfl" (London BikePoint, non-GBFS); info/status URLs = BikePoint endpoint
userAgent: ""

# web (citibike-web) per-city config
cityId: ""               # nyc/dc/paris/cdmx
brand: ""
domain: ""
timezone: ""
hasEbikes: true
coldStartDays: 14
defaultScope: everywhere
neighborhoodLabel: Neighborhood
description: ""
umamiId: ""
areaOverrides: "{}"      # JSON string
retentionDays: 90        # drop dock_status chunks older than this (keeps each city bounded)
requireStationCode: false # drop feed entries with no short_name (e.g. Divvy "Public Rack" corrals — not real docking stations)
serviceHours: ""         # "HH:MM-HH:MM" local if the system closes overnight (e.g. Ecobici); empty = 24/7
defaultLang: en          # fallback UI language (en/es/fr) when the browser asks for something unsupported

images:
  # ingester still on the pre-rename GHCR package (registry doesn't follow repo
  # renames); switches to ghcr.io/kardolus/dockscan on its next image bump.
  ingester: ghcr.io/kardolus/citi-bike-dock-tracker:v20
  web: ghcr.io/kardolus/bikeshare-web:v70
